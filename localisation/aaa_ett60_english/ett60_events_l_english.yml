l_english:
 inc_res.1.t:0 "Increased Resources?"
 inc_res.1.d:0 "Would you like to have extra resources, based on Increased Resources mod? If you wish, you can also have only half of extra resources. \nThis was added to the ETT1960 mod to ensure that industrial production remain viable past the 1940s, when, normally, industry grinds to a halt for lack of resources to produce more modern equipment. The mid option is preferred to make sure that resources still remain relevant."
 inc_res.1.a:0 "I don't want any extra resources!"
 inc_res.1.a.d:0 "No extra resources will be added."
 inc_res.1.b:0 "Let me have them, but not too much."
 inc_res.1.b.d:0 "Half of the resources will be added."
 inc_res.1.c:0 "Give me all you got!"
 inc_res.1.c.d:0 "All of the resources will be added."

 shackles.1.t:0 "AI Shackles"
 shackles.1.d:0 "By extending the timeline of the game into the 1960s, the ETT1960 mod also extends the issue of the minor AI nations building copious amounts of military equipment and training huge armies. This is a problem by the end of the 1940s and even more so into the 1950s and 1960s, which have a significant impact in the game performance. ETT1960 adds production and recruitment limitations to those minor countries in order to ensure a playable game. Some countries, like Brazil and Argentina, which had a reasonable industry but did not much care for conflicts abroad (until, in the case of Brazil for example, they were dragged into it) will have a limitation on recruitable manpower only, while others (like El Salvador), will have both manpower and industry capped. \n\nIf you decided to impose these limitations called shackles on the AI, it can be removed via a decision (costs no pp) if you want to play with a minor nation. Nations that have shackles and are being justified against, or at war, will immediately loose their shackles and revert to normal mobilization and economic laws. Or you can play without them from the beginning, for all countries, but it will most certainly adversely impact the game performance. Its your choice.\n\nI invite you to check the Extended Tech Tree 1960 mod on Steam to continue playing way past the normal end date with new content."
 shackles.1.b:0 "I don't want to limit the AI."
 shackles.1.b.d:0 "Minor countries will receive no limitations."
 shackles.1.a:0 "Restrain the AI"
 shackles.1.a.d:0 "Minor countries will be limited."

 ett60.1.t:0 "Extended Tech Tree 1960"
 ett60.1.d:0 "Welcome to the Extended Tech Tree 1960 mod. While I have been helped along the way, this is largely a one-member team effort, therefore I'd appreciate that if you encounter any bugs or problems, please let me know. You can reach me directly via our Discord server (link in Steam description).\nDo you need tutorial events for mod specific mechanics?"
 ett60.1.a:0 "Yes, give me the tutorials."
 ett60.1.b:0 "No, I'm a veteran."

 ett60.2.t:0 "The death of Yakov Etinger"
 ett60.2.d:0 "MGB investigator Mikhail Ryumin submited a report to Minister Viktor Abakumov claiming that Professor Yakov Etinger, already under arrest as a “bourgeois nationalist” with ties to the Jewish Anti-Fascist Committee, had deliberately mistreated Andrei Zhdanov and Alexander Shcherbakov during their final illnesses. The claim is that the treatment was not negligent, but intentional.\n\nAbakumov rejects the report and refuses to accept the accusation. No immediate action is taken on Ryumin’s claims. The case remains within the MGB.\n\nEtinger eventually dies in prison after prolonged interrogation and harsh conditions. After his death, responsibility is assigned to Ryumin. He is dismissed from his position, formally for misappropriation of funds, and is also held accountable for Etinger’s death.\n\nWith the support of Georgy Malenkov, Ryumin writes a letter to Stalin. In the letter, he accuses Abakumov of arranging Etinger’s death in order to conceal a conspiracy to eliminate members of the Soviet leadership through medical means.\n\nOn 4 July 1951, the Politburo establishes a commission to investigate the situation. The commission is headed by Malenkov and, based on its findings, the Politburo issues a resolution describing a “bad situation in the MGB.""
 ett60.2.a:0 "It must be the paranoia talking again."
 ett60.2.b:0 "The Trotskyite terrorism is back!"
 
 ett60.3.t:0 "Lydia Timashuk's letter"
 ett60.3.d:0 "Recently, a letter retrieved from the central archives has, again, cast doubts regarding subversive activities by Soviet Doctors. It had been sent in 1948 by cardiologist Lydia Timashuk to General Nikolai Vlasik, head of Stalin’s security. In the letter, she states that Andrei Zhdanov had suffered a heart attack, but that the Kremlin doctors responsible for his care failed to recognize it. According to her account, they prescribed incorrect treatment, and his condition worsened.\n\nZhdanov died soon afterward. Timashuk’s letter claims that the doctors not only made an error, but later concealed it. At the time it was written, the warning did not lead to action. The document was set aside and remained in the archives without consequence. Now, it is brought forward again and reconsidered.""
 ett60.3.a:0 "Investigate this agitator."
 ett60.3.b:0 "A new purge is in order!"
 
 ett60.4.t:0 "Lydia Timashuk's letter investigated"
 ett60.4.d:0 "Under Abakumov’s direction, the document is reviewed in full. Its tone is insistent but narrow, centered on a single diagnosis and a single interpretation of events. The investigation finds no substantiated evidence of intent—only assertion. While the medical conclusion is not entirely implausible, it is presented without the broader clinical context, without supporting records, and without corroboration from those directly involved in the treatment.\n\nThe review also addresses why the letter was not acted upon in 1948. The explanation remains unchanged: it had already been examined and judged insufficient. The responsible officials at the time, including Vlasik, found no grounds for further action, and the matter was set aside accordingly.\n\nIn its current use, however, the letter is being treated differently. What was originally a complaint about a possible misdiagnosis is now being cited as evidence of deliberate wrongdoing. Abakumov’s investigation notes that this shift does not originate from the document itself, but from the way it is being reinterpreted.\n\nNo indication is found of coordinated action, no proof of intent to harm, and no material evidence beyond retrospective judgment. At most, the letter reflects a disagreement over diagnosis, later elevated into accusation. The conclusions now being drawn from it exceed what the document can support.\n\nThe final assessment of the investigation is that the letter reflects suspicion, not proof. It is shaped by hindsight and certainty that were not available at the time of treatment. To treat it as evidence of deliberate action is to impose meaning onto it that it does not contain."
 ett60.4.a:0 "Finally, the end to this paranoia."
 
 ett60.5.t:0 "Doctors are charged"
 ett60.5.d:0 "On Stalin’s orders, TASS and Pravda begin publishing reports describing the discovery of a group of doctors accused of plotting to assassinate senior Soviet leaders, including Stalin himself with support from the Party leadership.\n\nOn 13 January 1953, Pravda announces the arrest and charging of several prominent Moscow doctors. Among them is Vladimir Nikitich Vinogradov, one of Stalin’s personal physicians. The report presents the case as a coordinated conspiracy: doctors accused of abusing their positions to deliberately misdiagnose patients and administer harmful treatments, leading to the deaths of figures such as Zhdanov and Shcherbakov.\n\nThe accusations extend beyond medical conduct. Several of the charged doctors are identified as agents of foreign intelligence, allegedly connected to American and British services, while others are linked to international Jewish organizations. These connections are presented as part of a wider hostile network acting against the Soviet state.\n\nThe publications call for vigilance. The case is framed not as an isolated matter, but as evidence of continuing efforts by external enemies to penetrate and undermine the Soviet Union from within."
 ett60.5.a:0 "Long live comrade Stalin!"
 
 ett60.6.t:0 "Stalin's Death"
 ett60.6.d:0 "Stalin spends an evening with members of his inner circle with the gathering continues late into the night, with drinking and conversation. In the early hours, the group disperses, and Stalin retires to his private quarters.\n\nThroughout the following day, no movement is reported from his rooms. Despite the presence of monitoring systems, no alert is raised. It is only late that night that his housekeeper enters and finds him lying on the floor. He is unconscious, breathing heavily, and unresponsive.\n\nBy the next morning, Party leaders arrives with a group of medical specialists. Their examination indicates severe hypertension and paralysis on the right side. They determine that Stalin has suffered a hemorrhagic stroke affecting the brain. The absence of trusted physicians, already implicated in the unfolding doctors’ case, is noted as the situation develops. Treatment begins immediately, including repeated attempts to reduce blood pressure.\n\nOver the next two days, his condition continues to decline. Despite medical intervention, there is no recovery. He dies in the evening, and the announcement is broadcast shortly afterward over Radio Moscow."
 ett60.6.a:0 "The Union will mourn."
 
 ett60.7.t:0 "Stalin's Death"
 ett60.7.d:0 "The death of Joseph Stalin is announced by Soviet authorities and quickly becomes the focus of global attention. Reports describe him succumbing after a sudden illness, ending his long tenure as leader of the Soviet Union. Governments and observers around the world respond with a mix of caution, concern, and formal acknowledgment of his influence on international affairs.\n\nIn Moscow, preparations for a state funeral proceed on a large scale. Large crowds gather to pay their respects as his body is placed on public display. The ceremony is attended by senior Soviet officials and foreign delegations, marking the passing of a figure whose leadership had shaped both the Soviet state and the broader geopolitical landscape." 
 ett60.7.a:0 "The end of an era."
 
 ett60.8.t:0 "Stalin's Succession"
 ett60.8.des:0 "Stalin’s death leaves a vacuum at the center of power. Authority is no longer concentrated, and the system stands in a moment of uncertainty, with several directions emerging from within the leadership.\n\nOne direction is driven by the Party’s internal machinery. It seeks to consolidate control through established structures, relying on organization, loyalty, and influence within the hierarchy to reassert political primacy.\n\nAnother direction takes shape around administrative and economic management. It emphasizes stability through governance, prioritizing production, planning, and the practical functioning of the state.\n\nA third direction emerges from the security organs. It is grounded in surveillance, enforcement, and discipline, aiming to preserve order and continuity through the existing instruments of control.\n\nA fourth direction is tied to the armed forces. It draws on military prestige and organization, extending authority from wartime leadership into the political sphere."
 ett60.8.a:0 "The Party Apparatchiks are our soul."
 ett60.8.b:0 "The Technocrats already run things."
 ett60.8.c:0 "The MGB/MVD will clean the ranks."
 ett60.8.d:0 "The Military will protect the revolution."
 
 ett60.9.t:0 "Tying loose ends at the NKVD"
 ett60.9.d:0 "After the upheaval of the Great Purge, control over the internal security apparatus has to be reasserted. NKVD has concentrated too much power and needs to be trimmed. Its leadership has been destabilized, and the organization required consolidation under a single, reliable authority.\n\nWe need a single leader, who will be trusted to restore order, centralize operations, and bring the institution back under firm political direction." 
 ett60.9.a:0 "Beria shows promise."
 ett60.9.b:0 "Yagoda frightens me."
 ett60.9.c:0 "Yezhov proved his loyalty."
  
 ett60tech.1.t: "Inflight Refueling Tutorial"
 ett60tech.1.d: "Inflight refueling works. However, it requires some input from the player as to configure the squadrons correctly. In order to have your refueling aircraft correctly assigned to their squadrons, the player must create a plane that has the same airframe type, role and missions as the combat aircraft in a Squadron.\nIn other words, if you want to add a refueling aircraft to a small airframe squadron, you must create your refueling aircraft using the small airframe version of the refueling airframe.\nJust so the tanker aircraft can successfully join the squadrons it must have an exact match in the “available missions” and role. Use the modules in the weapon slots to create an EXACT MATCH to the aircraft in the squadron.\nIf you’ve done it correctly the refueling aircraft will automatically join your squadrons.\nIt might be hard to make sure that your squadrons are being automatically reinforced with the correct airplanes, so I suggest you periodically keep an eye on them."
 ett60tech.1.a: "Sweet!"
 
 ett60tech.2.t: "Fleet Oiler and Submarine Tankers Tutorial"
 ett60tech.2.d: "Fleet oilers extend your fleets range in a very logical and straightforward way: task force range is calculated as an average of the total range of individual ships in the TF. Fleet oilers have massive ranges in itself, and they'll assist in increasing the average task force range of the TFs they're a part of. As fleet sizes increase, there's less fuel from the oiler to pass around the fleet, so the overall range bonus from the FO decreases. In other words: the bigger the fleet, more FOs you'll need to increase its range.\nBut be careful! Fleet oilers are slow and defenseless, and they can be a liability in a battle retreat.\nThe same logic applies to Submarine Tankers. This system can be as a military, on map, couterpart to the civilian, convoy-based, Underway Replenishment system."
 ett60tech.2.a: "Sweet!"
 
 ett60_tutorials.1.t: "Infantry Fighting Vehicles"
 ett60_tutorials.1.d: "IFVs are a Special Project available after researching the 1953 mechanized. Upon research it will make the Armored Cavalry battalion available, which is a step up from Mechanized battalion in terms of combat abilities."
 ett60_tutorials.1.a: "Got it."
 ett60_tutorials.2.t: "Anti-Tank Armored Cars"
 ett60_tutorials.2.d: "Anti-Tank Armored Cars, available initially as a subtech of the 1942 Armored Car, have been separated from the main Armored Car line, and unlock the Light Armored Recon AT Company and the Armored Car Anti Tank battalion. It provides some armor to your soft units, while adding more hard attack and piercing than the regular Armored Car. "
 ett60_tutorials.2.a: "Got it."
 ett60_tutorials.3.t: "Medicine Techs"
 ett60_tutorials.3.d: "Available in the Support Companies folder, the medicine techs provide global boosts to monthly population growth and unlock further steps in the field hospital line."
 ett60_tutorials.3.a: "Got it."
 ett60_tutorials.4.t: "New Trains"
 ett60_tutorials.4.d: "ETT60 adds three new train models.\n\nThe AA Armored Train works like the regular armored train but has better Anti-Air.\n\nBoth post war trains are slightly armored but their techs also provide global boosts to supply hub range and construction speed."
 ett60_tutorials.4.a: "Got it."
 ett60_tutorials.5.t: "Changes to Tanks"
 ett60_tutorials.5.d: "In ETT60 tanks are different than in Vanilla. \n\nHeavy and Super Heavy tanks cannot take the Anti-Air or Flame tank roles anymore. \n\nThe Para Tank is unlocked by the Paradropped Light Tank special project, which in turn is unlocked by the Airborne Armor Special Forces doctrine. \n\nModern Tanks cannot take the amphibious role anymore. \n\nThere is a “Turret Modification” special slot that allows you to modify your turrets and, in general, allow you to mount bigger guns on smaller chassis. \n\nEngine and Armor value ticks go up to 25. \n\nETT60 also add many new modules to the tank designer."
 ett60_tutorials.5.a: "Got it."
 ett60_tutorials.6.t: "Heavy Artillery"
 ett60_tutorials.6.d: "Heavy Artillery offers enhanced defense, collateral damage, and hard attack compared to regular artillery. It also serves in counter battery roles, with specific technologies boosting battalion stats: more breakthrough for line artillery and greater defense for line heavy artillery."
 ett60_tutorials.6.a: "Got it."
 ett60_tutorials.7.t: "Manpads"
 ett60_tutorials.7.d: "Manpads provide a modern anti-air support company with good AA stats."
 ett60_tutorials.7.a: "Got it."
 ett60_tutorials.8.t: "Missile Artillery"
 ett60_tutorials.8.d: "The final steps in the AA, Anti-Tank and Artillery lines are missile versions and are unlocked by special projects. They replace tube artillery equipment in the same battalions and companies and do not require to change division templates. \n\nSome techs are locked behind other radar techs from the Engineering techs folder."
 ett60_tutorials.8.a: "Got it."
 ett60_tutorials.9.t: "Field Hospitals and Trickleback"
 ett60_tutorials.9.d: "The values for trickleback modifiers have been reduced to prevent them from exceeding 100% by the end of the game timeline."
 ett60_tutorials.9.a: "Got it."
 ett60_tutorials.10.t: "Engine Types and new naval modules"
 ett60_tutorials.10.d: "All ships now have a slot for their engine type. It indicates what type of engine this ship is using and will affect its stats. Nuclear reactors are now a type of engine rather and a different engine altogether. \n\nOther new modules include: a dedicated slot for aviation facilities (aircraft catapults and helicopter hangars, for example), torpedo protection (now separate from armor), and a slot for the type of sail/island/mast used in the ship."
 ett60_tutorials.10.a: "Got it."
 ett60_tutorials.11.t: "Auxiliary Ships"
 ett60_tutorials.11.d: "ETT60 adds two new types of auxiliary ships to the game, the Fleet Oilers and the Amphibious Assault ships. Both work like Vanilla’s support ships, by providing support bonuses to the fleets they’re attached to. \n\nFleet Oilers provide range extension, bonus to max organization and reduction to attrition. \n\nAmphibious Assault ships provide a bonus to the fleet’s shore bombardment value, while giving debuffs to retreat chance and coordination. Use Amphibious Assault ships in fleets with the Invasion Support Mission. As they multiply a fleet’s shore bombardment value, they require other combat ships to be in the fleet to make it worthwhile."
 ett60_tutorials.11.a: "Got it."
 ett60_tutorials.12.t: "Naval Radar and Sonar"
 ett60_tutorials.12.d: "Destroyers and Cruisers now have dedicated radar and sonar slots, and can be equipped with both at the same time. \n\nSubmarines now can also equip both their own dedicated lines of radars and sonars."
 ett60_tutorials.12.a: "Got it."
 ett60_tutorials.13.t: "Guided Missile Ships"
 ett60_tutorials.13.d: "Upon researching guided missiles, you’ll be able to access Light, Cruiser and  Heavy hulls that can be equipped with missiles. \n\nThere is also a Converted Missile Destroyer hull that can be converted from regular 1954 destroyer hulls."
 ett60_tutorials.13.a: "Got it."
 ett60_tutorials.14.t: "Helicopter Carrier"
 ett60_tutorials.14.d: "Helicopter Carriers are available as a special project after researching either the VTOL airframe or naval helicopters. Helicopter carriers are different in that they can ONLY carry VTOL fighters or naval helicopters; other types of carrier aircraft cannot be used in them. Helicopter Carriers fill a role similar to vanilla’s escort carrier, with better stats at submarine detection, being useful while escorting convoys or other naval units."
 ett60_tutorials.14.a: "Got it."
 ett60_tutorials.15.t: "Tanker Submarine"
 ett60_tutorials.15.d: "The Tanker Submarine is a submarine with modest attack specs, but with greatly enlarged range. HoI4 fleet ranges are calculated as an average of the range of all units in a fleet, therefore by adding some tanker submarines to your submarine fleets you will increase the range of the entire fleet."
 ett60_tutorials.15.a: "Got it."
 ett60_tutorials.16.t: "Regular Submarines and Fleet Submarines"
 ett60_tutorials.16.d: "The main submarine line is now divided into the attack submarine and fleet submarine lines. \n\nFor in game purposes, Fleet Submarines represent larger oceangoing submarines and will eventually lead to the Ballistic Missile Submarine and the Missile Launching Submarine. \n\nThe Attack Submarine line represent shorter range submarines, including coastal submarines, whose main goal is to hunt enemy combatants, including other submarines.’"
 ett60_tutorials.16.a: "Got it."
 ett60_tutorials.17.t: "Carrier Submarines"
 ett60_tutorials.17.d: "Carrier submarines in ETT60 work line they do in vanilla, but now they have dedicated aircraft that can be designed using the Submarine Launched Airframe."
 ett60_tutorials.17.a: "Got it."
 ett60_tutorials.18.t: "Naval Support Techs"
 ett60_tutorials.18.d: "The torpedo lines have been separated, with one for surface torpedoes and another for submarine torpedoes."
 ett60_tutorials.18.a: "Got it."
 ett60_tutorials.19.t: "Changes to the Aircraft Designer"
 ett60_tutorials.19.d: "The aircraft designer received a lot of changes in ETT60. \n\nAircraft now have multiple dedicated slots: a slot for its wing type, tail, body and engine modifications, electronic countermeasures, fuel type, onboard radars, optics and auxiliary propulsion. All making for a very customizable aircraft designer. \n\nSome modules have different requirements, including other modules. For example, certain types of bombsights are radar guided, and require a ground radar to be equipped in the radar slot, or afterburners cannot be equipped with prop engines or older types of jet engines. If your design is invalid, make sure to read the tooltips carefully to figure out what’s wrong with it. \n\nNot all jet engines can be applied to all airframes, as well. If you can’t see a jet engine tier while designing an aircraft, its probably not meant to that specific airframe level. This is for balance reasons. \n\nThere are two new types of aircraft: medium recon aircraft and medium naval bombers, accessible by giving medium airframe a recon camera or naval weapon on their first weapon slot. \n\nAircraft cannons are not separated into regular and heavy cannons anymore."
 ett60_tutorials.19.a: "Got it."
 ett60_tutorials.20.t: "Air to Air Missiles"
 ett60_tutorials.20.d: "Air to Air Missiles evolved over time. \n\nThe first tier of missiles are manually guided intercept missiles, and provides attack only on interception mission. \n\nThe second, third and fourth tiers are intercept-missiles that are radar guided, and also only provides attack on interception mission. They require the aircraft to have an air radar equipped to be installed. \n\nThe IR Air to Air missiles are the pure dogfight missiles and provide air attack regardless of mission and do not require radars to be equipped. "
 ett60_tutorials.20.a: "Got it."
 ett60_tutorials.21.t: "Motherships"
 ett60_tutorials.21.d: "Motherships can now be designed, and their parasite fighters are separate modules that can be researched individually. There are two lines of parasite fighters, one as converted regular fighters, available as subtechs in the small airframe tech line, and dedicated parasite fighters, available through techs in the mothership line."
 ett60_tutorials.21.a: "Got it."
 ett60_tutorials.22.t: "VTOL fighter airframe"
 ett60_tutorials.22.d: "VTOL fighters are available through special project and unlock a specialized small airframe with greater agility but worse range and defense. VTOL fighters can be deployed in regular carriers as well as in helicopter carriers."
 ett60_tutorials.22.a: "Got it."
 ett60_tutorials.23.t: "Airlifters"
 ett60_tutorials.23.d: "Airlift planes, part of the transport line, can only provide air supply and cannot perform paradrop missions. They can also perform a new type of raid, which is the airlift raid, that if successful provides a bonus to the targeted state that give a timed boost to local supply and supply hub construction.\n\nAirlift missions can only be performed in times of war, in territory you control, and require at least 70 Heavy Transport planes to be deployed in an airwing."
 ett60_tutorials.23.a: "Got it."
 ett60_tutorials.24.t: "Helicopters"
 ett60_tutorials.24.d: "ETT60 expands helicopters beyond what’s available in vanilla. \n\nNaval helicopters are short range aircraft with very good anti-submarine capabilities. They can be deployed from land bases or carriers. \n\nUtility helicopters are workhorses and unlock the Airmobile unit, a very fast glass cannon type of battalion. They also replace the regular helicopters as the required equipment in the Med-Evac and Helicopter Transport companies. \n\nCargo helicopters are heavy duty transports and unlock the Aviation Support Company, which is a great all around support company."
 ett60_tutorials.24.a: "Got it."
 ett60_tutorials.25.t: "Radar Stations"
 ett60_tutorials.25.d: "Radar station levels go as far as level 11 in ETT60. The initial radar range has been reduced to be more realistic and to allow for a more gradual increase in benefits over time."
 ett60_tutorials.25.a: "Got it."
 ett60_tutorials.26.t: "Missiles"
 ett60_tutorials.26.d: "ETT60 greatly expands the missile tree, with the addition of dedicated submarine launched cruise missiles, submarine launched ballistic missiles. The guidance systems techs also unlock some modules and are the requirement for other techs in other parts of the tree."
 ett60_tutorials.26.a: "Got it."
 ett60_tutorials.27.t: "Material Sciences"
 ett60_tutorials.27.d: "Material sciences techs provide bonuses to unit upkeep and supply consumption. But, importantly, they’re also required techs for more advanced applications elsewhere in the tree."
 ett60_tutorials.27.a: "Got it."
 ett60_tutorials.28.t: "Agriculture"
 ett60_tutorials.28.d: "Like the medicine techs, agriculture techs provide global boosts to monthly population growth."
 ett60_tutorials.28.a: "Got it."
 ett60_tutorials.29.t: "Large Cruiser Special Project"
 ett60_tutorials.29.d: "The Large Cruiser special project is supposed to cover a large array of ships designs proposed in the 1930s and early 1940s, from pocket battleships (panzerschiff) to cruiser killer designs. They are heavier than heavy cruisers, but not big enough to justify the classification of battlecruiser. \n\nThe large cruiser armor is available for both the large cruiser hull and the heavy hull to allow the player to choose the size of the ship they’re designing, to for example build something very close to the historical Alaska class."
 ett60_tutorials.29.a: "Got it."
 ett60_tutorials.30.t: "Super Heavy Battleship Special Project"
 ett60_tutorials.30.d: "SHBBs now have two tiers, the first immediately unlocked via the special project, and the second unlocked as subtech in the naval tree."
 ett60_tutorials.30.a: "Got it."
 ett60_tutorials.31.t: "Modern Battleship Special Project"
 ett60_tutorials.31.d: "The modern battleship special project has been  changed to represent the post-war missile battleships/battlecruiser designs that never came to fruition like the Kentucky class BBG."
 ett60_tutorials.31.a: "Got it."
 ett60_tutorials.32.t: "Modern Carrier Special Project"
 ett60_tutorials.32.d: "The modern carrier special project now represents the super carriers starting with the United States class and its equivalents. Super carriers have the Modern Deck Space module available which provides 15 deck spaces and armor, while older modules only provide 20 deck space or armor. \n\nThe game does not allow for final deck spaces in non-multiples of 10, rounding down. Therefore, one modern deck space allows for 10 aircraft (rounded down from 15), while 2 modern deck spaces allow for 30."
 ett60_tutorials.32.a: "Got it."
 ett60_tutorials.33.t: "Air Cushion Vehicles Special Project"
 ett60_tutorials.33.d: "Unlocked hovercrafts and the PACV Support company, which grants ground units very situational bonuses, providing buffs in generally flat and/or wet terrain (plains, rivers, deserts, marshes, etc) and debuffs in rugged terrain (mountain, forest, etc)."
 ett60_tutorials.33.a: "Got it."
 ett60_tutorials.34.t: "Early CIWS Special Project"
 ett60_tutorials.34.d: "Unlocks the CIWS ship module, which is an anti-air gun that also provides armor and surface visibility reduction to simulate how the system prevents hits by downing incoming missiles."
 ett60_tutorials.34.a: "Got it."
 ett60_tutorials.35.t: "Jet Special Projects"
 ett60_tutorials.35.d: "ETT60’s jet special projects vary from vanilla’s. The first project is the first tier jet engine, that provides the early jet engine module and unlocks the modern light airframes. These engines represent the very first to be put to operational use in aircraft such as the Me262, P-80 and Gloster Meteor. \n\nThe second project is the First Generation Jet Engine, that unlocks the second tier jet engine, to represent the first mature jet engines of the subsonic first generation of jet engines. Such as those used in the F-85 or Mig-15. This project unlocks the 1947 small airframe. \n\nThe third project is the Transonic Studies special project that unlocks the first supersonic jet engines and afterburners, as well as the 1950 small airframe. \n\nFollowing jet engines are unlocked by regular techs."
 ett60_tutorials.35.a: "Got it."
 ett60_tutorials.36.t: "Antipodal Bomber Special Project"
 ett60_tutorials.36.d: "Unlocks the Antipodal Bomber unit. The antipodal bomber is a unit that can only be used via raids. Antipodal bombers can perform recon and nuclear strike raids via the raids menu. Antipodal bomber raids also require ICBMs from your equipment pool as launch vehicles."
 ett60_tutorials.36.a: "Got it."
 ett60_tutorials.37.t: "Reconnaissance Satellite Special Project"
 ett60_tutorials.37.d: "Recon Sats work as a disposable unit to perform recon raids, via the raids menu. These raids also require ICBMs from your equipment pool as launch vehicles."
 ett60_tutorials.37.a: "Got it."
 ett60_tutorials.38.t: "Hardened Missile Silos Special Project"
 ett60_tutorials.38.d: "Hardened Missile Silos work exactly like a rocket site, but are invulnerable to enemy strategic bombing."
 ett60_tutorials.38.a: "Got it."
 ett60_tutorials.39.t: "Anti Ballistic Missile System Special Project"
 ett60_tutorials.39.d: "Unlocks the ABM System building, which when deployed will greatly reduce the success chance of enemy nuclear strikes with ballistic missiles on the state it has been built. Being able to shootdown suborbital targets, ABM systems also reduce the success chance of antipodal bomber raids. "
 ett60_tutorials.39.a: "Got it."
 ett60_tutorials.40.t: "Multiple Reentry Vehicles Special Project"
 ett60_tutorials.40.d: "The MRV project unlocks MRV raids, which raise the odds of successfully targeting states protected by enemy ABM systems. It also raises the cost of each raid to require 3 nuclear warheads per strike."
 ett60_tutorials.40.a: "Got it."
 ett60_tutorials.41.t: "Ballistic Nylon Special Projects"
 ett60_tutorials.41.d: "Both work as a secondary way to give a global bonus to casualty trickleback."
 ett60_tutorials.41.a: "Got it."
 
 tutorial_bomber_buster: "Bomber Buster Cannons"
 
 ett60_tutorials.42.t: "Bomber Buster Cannons"
 ett60_tutorials.42.d: "Bomber Buster Cannons are the same equipment as the tank buster but give the fighter role when added in the main weapons slot. This is intended to allow the construction of historical bomber interceptors that used such large cannons. One example would be Me 262A-1a/U4."
 ett60_tutorials.42.a: "Got it."
 
 non_strategic_jet_engine: "Non-Strategic Materials Jet Engines"
 
 ett60_tutorials.43.t: "Non-Strategic Materials Jet Engines"
 ett60_tutorials.43.d: "The Non-Strategic Materials Jet Engines module allows the construction of jet engines without Tungsten as a required resource. Historically Germany had trouble fielding its jets at the end of the war due to a lack of strategic materials to build them. Other materials were used at the expense of efficiency and reliability, and this can be simulated through the use of this module."
 ett60_tutorials.43.a: "Got it."
 
