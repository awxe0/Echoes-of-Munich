 usa_ett60.75.t:0 "Robert Taft Dead"
 usa_ett60.75.d:0 "By the summer of 1953, the White House had grown quieter around President Robert Taft. The cancer that doctors had once hoped to contain was now impossible to conceal, and the long corridors of the residence filled with the subdued rhythm of physicians, advisers, and family moving carefully around the ailing president.\n\n\Taft continued to work from a small desk near his bedroom, insisting on reviewing legislative briefs and signing correspondence even as his strength faded. Visitors later recalled that he spoke little about his illness; instead he asked about the Senate, about budget negotiations, about the direction of the Republican Party he had spent his life shaping.\n\nIn the final weeks, Cabinet members came individually to pay their respects, conversations often drifting into long reflections on Congress and constitutional limits on power—subjects that had defined Taft’s political life. Washington sensed the end approaching.\n\nWhen he finally succumbed in the White House, the nation mourned a president whose tenure had been brief but unmistakably marked by his austere commitment to congressional government and cautious foreign policy. In death, as in life, Taft remained the Senate’s most faithful son who had briefly carried its spirit into the presidency."
 usa_ett60.75.a:0 "A shame, really."
 
 usa_ett60.76.t:0 "JFK Assassination"
 usa_ett60.76.d:0 "In November 1963, the atmosphere around John F. Kennedy was unusually optimistic. The administration had begun preparing quietly for the coming election year, and the president’s political advisers believed a tour through the South might stabilize the Democratic coalition after months of tension over civil rights.\n\n The trip to Dallas was intended as a gesture of reconciliation. Kennedy appeared relaxed during the motorcade, standing occasionally to wave at the dense crowds lining the streets. Observers later recalled the scene as almost celebratory, with cheers echoing along the route through Dealey Plaza.\n\n Then, in a matter of seconds, the atmosphere shattered. Shots rang out from above the street, striking the president as the motorcade passed the Texas School Book Depository. The limousine accelerated toward Parkland Hospital while stunned spectators struggled to comprehend what had just happened.\n\nWithin hours, authorities arrested Lee Harvey Oswald, but the shock had already spread across the nation. News bulletins interrupted regular broadcasts, and Americans gathered around radios and televisions as confirmation arrived that the president had died.\n\nIn the abrupt silence that followed, the presidency passed to Lyndon B. Johnson, sworn in aboard Air Force One before the aircraft departed Dallas. The country entered a period of mourning and uncertainty, marked by the sense that a brief, hopeful chapter of American politics had ended in an instant."
 usa_ett60.76.a:0 "I wonder what could have prevented it."
