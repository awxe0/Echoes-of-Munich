RCP_infrastructure_effort_ii:0 "Infrastructure Effort II"
RCP_infrastructure_effort_ii_desc:0 "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
RCP_capital_ship_effort:0 "Capital Ship Effort"
RCP_capital_ship_effort_desc:0 "The nation with the most battleships will rule the oceans. Battleships and carriers represent the old and the new in naval superiority."
