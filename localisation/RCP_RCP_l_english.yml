RCP_bomber_focus:0 "Bomber Focus"
RCP_bomber_focus_desc:0 "When people of the future speak of the horror to today's wars, fire raining from the skies will prominently feature. We will do our best to ensure those stories are told by our enemies."
RCP_for_the_king:0 "For The King!"
RCP_for_the_king_desc:0 "We must fight for our nation at all costs!"
