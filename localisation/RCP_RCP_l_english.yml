RCP_naval_invasions_desc:0 ""
RCP_rocket_effort:0 "Rocket Effort"
RCP_rocket_effort_desc:0 "Rocket and jet engines allow for unprecedented speeds for unmanned and manned vessels alike. Pioneering these technologies will allow us to take the enemy by surprise."
