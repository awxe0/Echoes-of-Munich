RCP_rare_metals_excavation_desc:0 ""
RCP_destroyer_effort:0 "Destroyer Effort"
RCP_destroyer_effort_desc:0 "Studying the design and strategic use of submarines, we have also learned how to counter those strategies. Destroyers will be crucial for this."
RCP_nav_effort:0 "NAV Effort"
RCP_nav_effort_desc:0 "Just as the new naval warfare takes place in part beneath the water's surface, part of it takes place in the air above the waters."
RCP_cas_effort:0 "CAS Effort"
RCP_cas_effort_desc:0 "A modern army needs support from vehicles not only on the ground, but also in the air."
RCP_equipment_effort_iii:0 "Equipment Effort III"
RCP_equipment_effort_iii_desc:0 "Instead of imitating or buying foreign equipment, we should aim to become world-leading in infantry weapons."
RCP_mechanization_effort:0 "Mechanization Effort"
RCP_mechanization_effort_desc:0 "Rethinking the possibilities of motorized infantry, we can push the limits of what vehicles can be constructed today."
RCP_rightwing_politics:0 "Right-Wing Politics"
RCP_rightwing_politics_desc:0 "Our nation is unique, and our political achievements could only have happened here. We must fight for it at any cost."
RCP_leftwing_politics:0 "Left-Wing Politics"
RCP_leftwing_politics_desc:0 "Ideology knows no borders. Another nation may call itself sovereign, but our convictions are above such claims."
