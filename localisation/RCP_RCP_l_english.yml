RCP_large_navy_desc:0 "Adapting our naval doctrines to accommodate large ships and ensuring the safety of our trade convoys will teach us much about what sort of ships we need."
RCP_flexible_navy:0 "Flexible Navy"
RCP_flexible_navy_desc:0 "Reinventing naval warfare to account for the advances in submarine technology will allow us to strike efficiently against enemy convoys."
RCP_industrial_effort:0 "Industrial Effort"
RCP_industrial_effort_desc:0 "Focus all our political efforts on building up the civilian industry in a great leap forward."
RCP_political_change:0 "Political Change"
RCP_political_change_desc:0 "To bring about change in the world, we need to be able to bring about change in our own country. Strengthening our political position should come first."
RCP_doctrine_effort:0 "Doctrine Effort"
RCP_doctrine_effort_desc:0 "The military doctrines that defined ground combat in the Great War are outdated. We must put our greatest minds to the task of shaping the military thought of tomorrow."
RCP_naval_effort:0 "Naval Effort"
RCP_naval_effort_desc:0 "The expansion of our navy should be our first priority. Assign all available resources to new Dockyards and research into light surface ships."
RCP_aviation_effort:0 "Aviation Effort"
RCP_aviation_effort_desc:0 "Nowhere is technological advances more rapid than in aerial warfare. Aviation is a field any modern nation must master."
