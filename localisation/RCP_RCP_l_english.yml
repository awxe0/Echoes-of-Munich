RCP_why_we_fight:0 "Why We Fight"
RCP_why_we_fight_desc:0 "The world is growing increasingly unsafe. Our people need to see the atrocities being committed by those who crave power. It is time we rally the people to our cause and ensure everyone is ready to fight for our freedom."
RCP_extra_research_slot_ii:0 "Extra Research Slot II"
RCP_extra_research_slot_ii_desc:0 "The rapid industrialization of our nation has opened up new opportunities in R&D that we should pursue."
RCP_bicycle_effort:0 "Bicycle Effort"
RCP_bicycle_effort_desc:0 ""
RCP_fighter_focus:0 "Fighter Focus"
RCP_fighter_focus_desc:0 "We have not seen that last of dogfights in the Great War. Keeping ahead in the development of fighter planes will give us an edge in the future."
RCP_construction_effort_iii:0 "Construction Effort III"
RCP_construction_effort_iii_desc:0 "Expansion of our infrastructure network has significantly improved our capacity for construction."
RCP_civilian_industry:0 "Civilian Industry"
RCP_civilian_industry_desc:0 ""
RCP_secret_weapons:0 "Secret Weapons"
RCP_secret_weapons_desc:0 "It is tempting to expend all extra resources into developing tanks and planes, but the secret to winning wars lies in whole new fields of science; electronics, rocketry and nuclear research."
