RCP_collectivist_ethos:0 "Collectivist Ethos"
RCP_collectivist_ethos_desc:0 "Our enemies may divide and conquer lesser nations, but our people will stand united. All for one and one for all."
RCP_armament_effort:0 "Armament Effort"
RCP_armament_effort_desc:0 "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
