RCP_deterrence:0 "Deterrence"
RCP_deterrence_desc:0 "Standing alone, we rarely benefit from war. Fortunately, we know that the best defense is one so well-known you never have to put it to use."
RCP_volunteer_corps:0 "Volunteer Corps"
RCP_volunteer_corps_desc:0 "Forcing our people to die for ideals of freedom would be an exercise in irony, but establishing means for those who wish to aid people abroad is not."
