RCP_ideological_fanaticism:0 "Ideological Fanaticism"
RCP_ideological_fanaticism_desc:0 "Our politically established values and goals are worth dying for as much as any ancient faith. Any follower should be prepared to face death, and those who stray better be prepared to face death."
RCP_spread_freedom:0 "Spread Freedom"
RCP_spread_freedom_desc:0 "We will spread freedom and democracy, whether they like it or not."
RCP_army_effort:0 "Army Effort"
RCP_army_effort_desc:0 "Despite the increasing possibilities of aerial and naval warfare, ground combat is still key in tomorrow's wars. With preparation, we can avoid reliving the hell of the trenches."
RCP_militarism:0 "Militarism"
RCP_militarism_desc:0 "Those who view the military as a necessary evil are doomed to hesitate in the face of war. We will ingrain militarism into our culture to become a people of soldiers."
RCP_world_police_force:0 "World Police Force"
RCP_world_police_force_desc:0 "Why should we let people have fun when we can just guarantee them?"
RCP_successful_economy:0 "Successful Economy"
RCP_successful_economy_desc:0 "CHANGE TO SWAP IDEAS"
RCP_technology_sharing:0 "Technology Sharing"
RCP_technology_sharing_desc:0 "By sharing technological advances with our allies, our whole faction will be able to conduct wartime R&D more efficiently."
RCP_military_youth:0 "Military Youth"
RCP_military_youth_desc:0 "Organizations to promote discipline and political education of young people in our nation will foster loyalty and self-sacrifice early."
RCP_paramilitarism:0 "Paramilitarism"
RCP_paramilitarism_desc:0 "Military principles have applications outside of the military. With the development of semi-militarized units to complement our armed forces, more people will have military training."
RCP_define_war_crimes:0 "Define War Crimes"
RCP_define_war_crimes_desc:0 ""
RCP_political_commissars:0 "Political Commissars"
RCP_political_commissars_desc:0 "To ensure that our policies are followed in military practice, we will introduce politically appointed officials into military ranks."
