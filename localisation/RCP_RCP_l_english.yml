RCP_metal_excavation_desc:0 "random state add steel"
RCP_construction_effort:0 "Construction Effort"
RCP_construction_effort_desc:0 "Civilian industrial capacity must not be underestimated even when war looms over the world."
RCP_cruiser_effort:0 "Cruiser Effort"
RCP_cruiser_effort_desc:0 "Before making forays into advanced battleship research, the smaller cruisers are in need of replacement."
RCP_submarine_effort:0 "Submarine Effort"
RCP_submarine_effort_desc:0 "Submarine warfare is the most exciting naval development since the invention of the torpedo boat. We would do well to not just protect against submarines, but also use them against enemy shipping."
RCP_equipment_effort:0 "Equipment Effort"
RCP_equipment_effort_desc:0 "The limits for what equipment can be carried by infantry are constantly being pushed. We will focus on giving our troops the best tools available."
RCP_aviation_effort_ii:0 "Aviation Effort II"
RCP_aviation_effort_ii_desc:0 "Further advances in aviation will be necessary to integrate our air force well with other branches of the military."
RCP_doctrine_effort_ii:0 "Doctrine Effort II"
RCP_doctrine_effort_ii_desc:0 "The battlefield has changed not just in the interbellum years, but over the course of recent conflicts. We must continuously reevaluate our doctrines to reflect this."
RCP_equipment_effort_ii:0 "Equipment Effort II"
RCP_equipment_effort_ii_desc:0 "We will continue our efforts to ensure our infantry and support troops are armed with the best possible equipment of our time."
RCP_motorization_effort:0 "Motorization Effort"
RCP_motorization_effort_desc:0 "Mobility and protection are crucial to get infantry into and out of the field safely. Focusing on these developments will allow us to take action quickly."
